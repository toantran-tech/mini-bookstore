services:
  mysql:
    image: mysql:8.0.42
    environment:
      MYSQL_DATABASE: minibookstore
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-local-password}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DATABASE_PASSWORD:-local-password}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/minibookstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-local-password}
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-at-least-32-bytes}
      FRONTEND_URL: http://localhost:5173
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-demo}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-demo}
      MAIL_USERNAME: ${MAIL_USERNAME:-demo@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-demo-password}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-demo}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-demo-secret}
      VNPAY_RETURN_URL: http://localhost:8080/api/orders/vnpay-return
      FRONTEND_PAYMENT_RETURN_URL: http://localhost:5173/payment-return
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql-data:
