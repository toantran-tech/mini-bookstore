# Datasource URL is overridden at runtime by Testcontainers @ServiceConnection.
# A placeholder is required here so Hibernate can infer the MySQL dialect during context wiring
# (before the dynamic URL from the container is injected). No real connection is made to this URL.
spring.datasource.url=jdbc:mysql://localhost:3306/minibookstore_test?useSSL=false&serverTimezone=UTC
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway owns schema changes; Hibernate only validates entity mappings.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
# Non-production values used only while running automated tests.
jwt.secret=test-only-jwt-key-with-at-least-32-characters
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret
spring.mail.username=test@example.com
spring.mail.password=test-password
vnpay.tmnCode=TESTCODE
vnpay.hashSecret=test-vnpay-secret
app.cors.allowed-origins=http://localhost:5173
jwt.expiration=86400000
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/api/orders/vnpay-return
app.frontend.payment-return-url=http://localhost:5173/payment-return