# ─── Server ───────────────────────────────────────────────────────────────────
# Railway tự inject biến PORT, nên dùng ${PORT:8080} (fallback 8080 khi chạy local)
server.port=${PORT:8080}
spring.application.name=mini-bookstore

# ─── Database ─────────────────────────────────────────────────────────────────
# Đọc từ environment variable do Railway inject
# Khi chạy local: vẫn dùng giá trị mặc định sau dấu :
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/minibookstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# update = tự tạo/cập nhật bảng — OK cho production nhỏ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Tắt log SQL trên production để tránh lộ data nhạy cảm
spring.jpa.show-sql=${SHOW_SQL:false}

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Đọc từ env var, fallback local key nếu chạy local
jwt.secret=${JWT_SECRET:local-dev-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}